baseURL = "https://example.com/"
languageCode = "en-us"
title = "Essential Math for Artificial Intelligence"
# theme = "hextra"
theme = "hugo-PaperMod"

[params]
  math = true

  [params.homeInfoParams]
    Title = "Here is the Title"
    Content = "Welcome! This site covers the fundamental mathematics needed for artificial intelligence, including linear algebra, calculus, probability, and statistics."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/yourusername"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
  [markup.highlight]
    noClasses = false