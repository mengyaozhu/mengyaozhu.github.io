<script>
    
    function stripHtml(html) {
        
        const mathPlaceholders = [];
        let tempHtml = html.replace(/\$\$?([^$]+)\$\$?/g, (match) => {
            mathPlaceholders.push(match);
            return `%%MATH${mathPlaceholders.length - 1}%%`;
        });
        
        
        tempHtml = tempHtml.replace(/<[^>]*>/g, ' ');
        
        
        tempHtml = tempHtml.replace(/%%MATH(\d+)%%/g, (match, index) => {
            return mathPlaceholders[parseInt(index)];
        });
        
        return tempHtml;
    }

    
    function highlightTerms(text, terms) {
        if (!terms || terms.length === 0) return text;
        
        
        const mathBlocks = [];
        let tempText = text.replace(/\$\$?([^$]+)\$\$?/g, (match) => {
            mathBlocks.push(match);
            return `%%MATHBLOCK${mathBlocks.length - 1}%%`;
        });
        
        
        terms.forEach(term => {
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            tempText = tempText.replace(regex, '<mark class="search-highlight">$1</mark>');
        });
        
        
        tempText = tempText.replace(/%%MATHBLOCK(\d+)%%/g, (match, index) => {
            return mathBlocks[parseInt(index)];
        });
        
        return tempText;
    }

    
    function getPreview(content, terms, previewLength = 300) {
        if (!terms || terms.length === 0) {
            let preview = stripHtml(content.substring(0, previewLength));
            return preview.length < content.length ? preview + '...' : preview;
        }
        
        let bestPosition = -1;
        
        
        const cleanContent = stripHtml(content);
        
        
        for (const term of terms) {
            const pos = cleanContent.toLowerCase().indexOf(term.toLowerCase());
            if (pos !== -1 && (bestPosition === -1 || pos < bestPosition)) {
                bestPosition = pos;
            }
        }
        
        if (bestPosition === -1) {
            let preview = stripHtml(content.substring(0, previewLength));
            return preview.length < content.length ? preview + '...' : preview;
        }
        
        
        let start = Math.max(0, bestPosition - 80);
        let end = Math.min(cleanContent.length, bestPosition + 220);
        
        
        while (start > 0 && cleanContent[start] !== ' ' && cleanContent[start] !== '\n') {
            start--;
        }
        while (end < cleanContent.length && cleanContent[end] !== ' ' && cleanContent[end] !== '\n' && end - start < previewLength) {
            end++;
        }
        
        let preview = cleanContent.substring(start, end);
        
        
        if (start > 0) preview = '...' + preview;
        if (end < cleanContent.length) preview = preview + '...';
        
        return preview;
    }

    
    function renderMathInResults() {
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    
    async function performSearch() {
        const query = document.getElementById('search-input').value.trim();
        const resultsContainer = document.getElementById('search-results');
        
        if (query.length < 2) {
            resultsContainer.innerHTML = '';
            return;
        }
        
        
        const response = await fetch('/index.json');
        const pages = await response.json();
        
        
        const searchTerms = query.toLowerCase().split(/\s+/);
        const results = [];
        
        pages.forEach(page => {
            const content = (page.content || '').toLowerCase();
            const title = (page.title || '').toLowerCase();
            const summary = (page.summary || '').toLowerCase();
            
            let score = 0;
            let matchedTerms = [];
            
            searchTerms.forEach(term => {
                if (title.includes(term)) {
                    score += 10;
                    matchedTerms.push(term);
                }
                if (summary.includes(term)) {
                    score += 5;
                    matchedTerms.push(term);
                }
                if (content.includes(term)) {
                    score += 1;
                    matchedTerms.push(term);
                }
            });
            
            if (score > 0) {
                results.push({
                    ...page,
                    matchedTerms: [...new Set(matchedTerms)],
                    score: score
                });
            }
        });
        
        
        results.sort((a, b) => b.score - a.score);
        
        
        if (results.length === 0) {
            resultsContainer.innerHTML = '<p class="search-no-results">No results found for "' + query + '"</p>';
            return;
        }
        
        let html = '<ul class="search-results-list">';
        
        results.forEach(result => {
            
            let highlightedTitle = result.title;
            result.matchedTerms.forEach(term => {
                const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                highlightedTitle = highlightedTitle.replace(regex, '<mark class="search-highlight">$1</mark>');
            });
            
            
            let previewText = '';
            if (result.summary) {
                previewText = result.summary;
            } else if (result.content) {
                previewText = getPreview(result.content, result.matchedTerms);
            }
            
            let highlightedPreview = highlightTerms(previewText, result.matchedTerms);
            
            html += `
                <li class="search-result-item">
                    <h3><a href="${result.permalink}">${highlightedTitle}</a></h3>
                    <div class="search-preview">${highlightedPreview}</div>
                    <div class="search-meta">
                        ${result.date ? `<span class="search-date">📅 ${result.date}</span>` : ''}
                        ${result.tags ? `<span class="search-tags">🏷️ ${result.tags}</span>` : ''}
                    </div>
                </li>
            `;
        });
        
        html += '</ul>';
        resultsContainer.innerHTML = html;
        
        
        setTimeout(() => {
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }, 100);
    }

    
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performSearch, 300);
    });
</script>
